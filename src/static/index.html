    <!-- 防止主题跳色：在渲染前设置主题 -->
    <script>(function(){var d=document.documentElement,m=document.querySelector('meta[name="theme-color"]'),s=null,t='gray-white';try{s=localStorage.getItem('bibleTheme')||localStorage.getItem('readingTheme')}catch(e){}if(s==='gray-white'||s==='light-yellow'||s==='warm-yellow'||s==='dark-gray'||s==='night'){t=s}else if(s==='cool'||s==='warm'||s==='dark'){var map={cool:'gray-white',warm:'warm-yellow',dark:'night'};t=map[s]||'gray-white'}else{try{t=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'dark-gray':'gray-white'}catch(e){t='gray-white'}}d.setAttribute('data-theme',t);var colorMap={'gray-white':'#FFFFFF','light-yellow':'#FFF8E7','warm-yellow':'#F5F0E6','dark-gray':'#3E3E3E','night':'#1A1A1A'};if(m){m.setAttribute('content',colorMap[t]||'#FFFFFF');}})();</script>
    <!-- 伪装检测 -->
    <script>(function(){var ok=false;try{if(sessionStorage.getItem('cx_access')==='ok')ok=true;}catch(e){}if(!ok&&window.location.search.indexOf('zzg')!==-1){try{sessionStorage.setItem('cx_access','ok');}catch(e){}ok=true;}if(!ok&&window.location.hash&&window.location.hash.length>2){ok=true;}if(!ok){var isCap=window.Capacitor!==undefined||window.location.protocol==='capacitor:'||window.location.hostname==='localhost';var isPwa=window.navigator.standalone===true||(window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches);if(!isCap&&!isPwa)document.documentElement.classList.add('cx-disguise');}})();</script>

    <link rel="stylesheet" href="css/style.css">

    <style>
        body{padding-bottom:calc(44px + env(safe-area-inset-bottom, 0px));padding-top:env(safe-area-inset-top, 0px)}
        .container{padding:0;overflow:hidden}
        .header{color:var(--header-text);margin-bottom:20px}
        .content{padding:0}
        @media(min-width:768px){.header{margin-bottom:30px}}
        .trainings-grid{display:flex;flex-direction:column;gap:1px;margin:0;background:var(--group-divider-bg);overflow:hidden;border-radius:12px}
        .training-card{background:var(--surface);overflow:hidden;transition:background-color .2s}
        .training-card:hover{background:var(--nav-hover)}
        .training-card-wrapper{display:flex;align-items:stretch;gap:0}
        .training-link{display:block;padding:14px 16px;text-decoration:none;color:inherit;flex:1;min-width:0;transition:background-color .2s;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
        .training-link:active{background:var(--nav-hover)}
        .training-info{position:relative}
        .training-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;gap:8px}
        .skeleton-item{padding:16px;border-bottom:1px solid var(--border)}
        .skeleton-line{height:18px;background:linear-gradient(90deg,var(--surface-alt) 25%,var(--muted) 50%,var(--surface-alt) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px;margin-bottom:8px}
        .skeleton-line.short{width:30%;height:14px}
        @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
        .training-card .year-season{font-size:0.944rem;color:var(--brand);font-weight:600;flex-shrink:0;line-height:1.3}
        .training-card .info{color:var(--text-muted);font-size:0.889rem;white-space:nowrap;flex-shrink:0}
        .training-title-row{display:flex;align-items:center;gap:6px;margin-bottom:0}
        .training-card .title{font-size:1.05em;color:var(--text);line-height:1.6;font-weight:500;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;border-radius:4px;min-height:32px;flex:1}
        .training-title-row .arrow{margin-left:auto;color:var(--text-muted);font-weight:600;flex-shrink:0}
        .logo-trigger{cursor:pointer;user-select:none}
        .footer-meta{margin-top:10px;font-size:.9em}
        .home-status{padding:40px 20px;text-align:center;background:var(--surface);color:var(--text-muted)}
        .home-status.error{color:var(--danger-text)}
        .home-status-icon{font-size:1.333rem;margin-bottom:10px}
        .home-retry-btn{margin-top:20px;padding:10px 20px;background:var(--btn-primary-bg);color:var(--btn-primary-text);border:1px solid var(--btn-primary-border);border-radius:6px;cursor:pointer;font:inherit;font-weight:600;box-shadow:var(--shadow-sm)}
        .home-retry-btn:active{transform:scale(.98)}
        .footer{text-align:center;padding:16px;color:var(--text-muted);background:var(--surface-alt);border-top:1px solid var(--border)}
        /* 清除数据对话框（cx-dialog-mask/cx-dialog/title/desc 已移入 style.css 统一管理）*/
        .cx-dialog-opts{display:flex;flex-direction:column;gap:8px;padding:0 16px 14px}
        .cx-dialog-opt{display:flex;align-items:flex-start;gap:11px;padding:11px 12px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;background:var(--surface-alt);transition:border-color .15s,background .15s;-webkit-tap-highlight-color:transparent}
        .cx-dialog-opt.selected{border-color:var(--brand);background:var(--interactive-soft-bg)}
        .cx-dialog-opt-icon{font-size:1.111rem;flex-shrink:0;margin-top:1px}
        .cx-dialog-opt-body{flex:1}
        .cx-dialog-opt-title{font-size:0.722rem;font-weight:600;color:var(--heading);margin-bottom:2px}
        .cx-dialog-opt-sub{font-size:0.611rem;color:var(--text-muted);line-height:1.5}
        .cx-dialog-actions{display:flex;border-top:1px solid var(--border)}
        .cx-dialog-cancel{flex:1;padding:13px;background:none;border:none;font-size:0.778rem;color:var(--text-muted);cursor:pointer;border-right:1px solid var(--border)}
        .cx-dialog-confirm{flex:1;padding:13px;background:none;border:none;font-size:0.778rem;font-weight:600;color:var(--danger-text);cursor:pointer}
        .cx-dialog-confirm:active,.cx-dialog-cancel:active{background:var(--surface-alt)}
        .cache-status{margin-top:6px;font-size:0.667rem;color:var(--text-muted);text-align:center;min-height:14px;padding:0}
        .cache-status.success{color:var(--success-text)}
        .cache-status.error{color:var(--danger-text)}
        .cache-status.warning{color:var(--warning-text)}
        /* 伪装页 */
        html.cx-disguise .container,html.cx-disguise .footer,html.cx-disguise #app{display:none!important}
        #cxMaintenance{display:none;position:fixed;inset:0;z-index:9999;background:var(--surface,#fff);flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;box-sizing:border-box}
        html.cx-disguise #cxMaintenance{display:flex}
        .cx-maint-icon{font-size:3.556rem;margin-bottom:24px;cursor:default;-webkit-tap-highlight-color:transparent;user-select:none}
        .cx-maint-title{font-size:1.111rem;font-weight:600;color:var(--text,#333);margin-bottom:12px}
        .cx-maint-sub{font-size:0.778rem;color:var(--text-muted,#999);text-align:center;line-height:1.7;max-width:280px}
        /* PWA 强制安装遮罩 */
        .cx-install-mask{display:flex;position:fixed;inset:0;z-index:9500;background:rgba(0,0,0,.72);align-items:center;justify-content:center;padding:20px;box-sizing:border-box}
        .cx-install-box{background:var(--surface,#fff);border-radius:16px;width:min(320px,calc(100vw - 40px));box-shadow:0 8px 40px rgba(0,0,0,.35);overflow:hidden;text-align:center;padding:28px 24px 22px}
        .cx-install-icon{font-size:2.444rem;margin-bottom:10px}
        .cx-install-title{font-size:0.944rem;font-weight:700;color:var(--heading,#111);margin-bottom:6px}
        .cx-install-sub{font-size:0.667rem;color:var(--text-muted,#888);margin-bottom:18px;line-height:1.65}
        .cx-install-progress{height:4px;background:var(--border,#e0e0e0);border-radius:2px;margin-bottom:14px;overflow:hidden}
        .cx-install-progress-bar{height:100%;background:var(--brand,#007aff);border-radius:2px;width:0%;transition:width .3s ease}
        .cx-install-status{font-size:0.667rem;color:var(--text-muted,#666);min-height:16px;margin-bottom:14px;line-height:1.5}
        .cx-install-retry{display:none;padding:9px 22px;background:var(--brand,#007aff);color:#fff;border:none;border-radius:8px;font-size:0.778rem;font-weight:600;cursor:pointer}
        /* 朗读控制弹窗 */
        .speech-dialog{display:none;position:fixed;bottom:56px;left:8px;right:8px;z-index:950;background:var(--surface,#fff);border:1px solid var(--border,#e0e0e0);border-radius:16px;box-shadow:0 -4px 24px rgba(0,0,0,.18);padding:14px 16px max(14px,env(safe-area-inset-bottom,0px));flex-direction:column;gap:12px;max-width:420px;margin:0 auto;animation:cx-sd-in .22s ease}
        .speech-dialog.show{display:flex}
        .speech-dialog.cxs-playing{border-color:var(--brand,#007aff);box-shadow:0 -4px 24px rgba(0,0,0,.18),0 0 0 1px var(--brand,#007aff)}
        @keyframes cx-sd-in{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        .speech-dialog-mask{display:none;position:fixed;inset:0;z-index:949;background:rgba(0,0,0,.22)}
        .speech-dialog-mask.show{display:block}
        .sd-header{display:flex;align-items:center;justify-content:space-between}
        .sd-title{font-size:0.778rem;font-weight:600;color:var(--heading,#222);display:flex;align-items:center;gap:6px}
        .sd-close{background:none;border:none;font-size:1rem;color:var(--text-muted,#999);cursor:pointer;padding:4px 8px;border-radius:8px;-webkit-tap-highlight-color:transparent;line-height:1}
        .sd-close:active{background:var(--surface-alt,#f5f5f5)}
        .sd-controls{display:flex;align-items:center;gap:8px}
        .sd-play-pause{width:46px;height:46px;border-radius:50%;background:var(--brand,#007aff);border:none;color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent;transition:transform .12s}
        .sd-play-pause:active{transform:scale(.92)}
        .sd-loop{width:36px;height:36px;border-radius:8px;background:var(--surface-alt,#f5f5f5);border:1px solid var(--border,#e0e0e0);font-size:0.833rem;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:all .15s;color:var(--text-soft,#666)}
        .sd-loop:active{transform:scale(.92)}
        .sd-loop.active{color:#fff;background:var(--brand,#007aff);border-color:var(--brand,#007aff)}
        .sd-progress{flex:1;display:flex;flex-direction:column;gap:4px;min-width:0}
        .sd-range{width:100%;height:4px;-webkit-appearance:none;appearance:none;background:var(--border,#e0e0e0);border-radius:2px;outline:none;cursor:pointer;touch-action:none}
        .sd-range::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--brand,#007aff);cursor:grab;box-shadow:0 1px 4px rgba(0,0,0,.2)}
        .sd-range::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--brand,#007aff);cursor:grab;border:none}
        .sd-time{font-size:0.556rem;color:var(--text-muted,#999);font-family:'Courier New',monospace;text-align:center}
        .sd-footer{display:flex;align-items:center;justify-content:space-between}
        .sd-rate{padding:5px 8px;border:1px solid var(--border,#e0e0e0);border-radius:8px;font-size:0.667rem;background:var(--surface-alt,#f5f5f5);color:var(--text-soft,#666);font-weight:600;cursor:pointer}
        .sd-hint{font-size:0.611rem;color:var(--text-muted,#aaa)}
        /* 离线横幅 */
        #cxOfflineBanner{display:none;position:fixed;top:0;left:0;right:0;z-index:8000;background:#e65100;color:#fff;padding:11px 16px;font-size:0.722rem;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.2);line-height:1.5}
        #cxOfflineBanner.show{display:block}
        #cxOfflineBanner .cx-banner-dismiss{background:rgba(255,255,255,.25);border:none;color:#fff;padding:3px 10px;border-radius:4px;margin-left:8px;font-size:0.667rem;cursor:pointer;vertical-align:middle;-webkit-tap-highlight-color:transparent}
        /* 章节/批次视图容器 */
        #app{min-height:100vh}
        /* 启动加载页 */
        #cxSplash{position:fixed;inset:0;z-index:9800;background:var(--surface,#fafbff);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;box-sizing:border-box;transition:opacity .45s ease;pointer-events:none}
        #cxSplash.cx-splash-out{opacity:0}
        .cx-splash-ref{font-size:0.833rem;color:var(--brand,#007aff);font-weight:600;letter-spacing:.08em;margin-bottom:10px;text-align:center;animation:cx-splash-icon-in .8s ease both}
        .cx-splash-verse{font-size:0.944rem;color:var(--text,#1a1a1a);text-align:center;line-height:2;font-weight:400;animation:cx-splash-text-in .8s .2s ease both,cx-splash-breathe 3s 1.5s ease-in-out infinite}
        @keyframes cx-splash-icon-in{0%{opacity:0;transform:scale(.6) translateY(12px)}60%{opacity:1;transform:scale(1.08) translateY(-2px)}100%{opacity:1;transform:scale(1) translateY(0)}}
        @keyframes cx-splash-text-in{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
        @keyframes cx-splash-breathe{0%,100%{text-shadow:0 0 0 transparent}50%{text-shadow:0 0 18px rgba(139,69,19,.35)}}
    </style>
</head>
<body>
    <!-- 启动加载页 -->
    <div id="cxSplash">
        <div class="cx-splash-ref">诗篇 119:148</div>
        <div class="cx-splash-verse">我趁夜更未换，将眼睁开，<br>为要默想你的话语。</div>
    </div>
    <script>(function(){
        // APP / PWA 统一使用 HTML #cxSplash 启动加载页
        var _splashDone=false;
        function _dismissSplash(){
            if(_splashDone)return;_splashDone=true;
            var el=document.getElementById('cxSplash');
            if(!el)return;
            el.classList.add('cx-splash-out');
            setTimeout(function(){if(el&&el.parentNode)el.parentNode.removeChild(el);},480);
        }
        if(document.readyState==='complete')_dismissSplash();
        else window.addEventListener('load',_dismissSplash);
        setTimeout(_dismissSplash,4000);
    })();</script>
    <!-- 阅读进度条 -->
    <div id="cxReadingProgress" class="cx-reading-progress"></div>
    <!-- 伪装维护页 -->
    <div id="cxMaintenance">
        <div class="cx-maint-icon" id="cxMaintTrigger">📱</div>
        <div class="cx-maint-title" id="cxMaintTitle"></div>
        <div class="cx-maint-sub" id="cxMaintSub"></div>
    </div>
    <script>(function(){
        var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
        var icon=document.getElementById('cxMaintTrigger');
        var title=document.getElementById('cxMaintTitle');
        var sub=document.getElementById('cxMaintSub');
        if(isIOS){if(icon)icon.textContent='📲';if(title)title.textContent='添加到主屏幕';if(sub)sub.textContent='请发送到桌面缓存使用，在线版已不支持，请谅解';}
        else{if(icon)icon.textContent='📦';if(title)title.textContent='请下载 APK 离线使用';if(sub)sub.textContent='请下载APK离线使用，在线版已不支持，请谅解';}
        var cnt=0,t=0;
        if(icon)icon.addEventListener('click',function(){clearTimeout(t);cnt++;if(cnt>=20){try{sessionStorage.setItem('cx_access','ok');}catch(e){}location.reload();}else{t=setTimeout(function(){cnt=0;},999);}});
    })();</script>

    <!-- PWA 离线提示横幅 -->
    <div id="cxOfflineBanner">
        📶 需要网络连接才能首次安装缓存
        <button class="cx-banner-dismiss">知道了</button>
    </div>

    <!-- ── 首页视图（静态，默认显示）──────────────────────────────── -->
    <div id="homeView">
        <div class="container">
            <div class="header">
                <h1 id="mainLogo" class="logo-trigger">📖 圣经</h1>
                <p class="subtitle">多语言圣经阅读</p>
                <button type="button" id="cx-search-btn" style="margin-top:10px;padding:7px 18px;background:var(--surface-alt);color:var(--brand);border:1.5px solid var(--border);border-radius:20px;font:inherit;font-size:0.778rem;cursor:pointer;-webkit-tap-highlight-color:transparent">🔍 搜索经文</button>
            </div>
            <div class="content" id="homeContent">
                <div id="bookNavContainer"></div>
            </div>
        </div>
    </div>

    <!-- ── SPA 章节/批次视图容器（默认隐藏）──────────────────────── -->
    <div id="app" style="display:none"></div>

    <!-- 脚本 -->
    <script src="js/remote-config.js"></script>
    <script src="js/image-utils.js"></script>
    <script src="vendor/localforage.min.js"></script>
    <script src="js/dev-console.js"></script>
    <script src="js/theme-toggle.js"></script>

    <script src="js/lang-pack.js"></script>

    <!-- 国际化（必须在 bible-renderer.js 之前加载）-->

    <script src="js/ref-detector.js"></script>

    <!-- 并发竞速工具（必须在 app-update.js / resource-pack.js 之前加载） -->
    <script src="js/race-fastest.js"></script>

    <!-- APK 更新（仅在 APP / PWA 中加载） -->
    <script>(function(){
        var isCapacitor=window.Capacitor!==undefined;
        var isCapacitorScheme=window.location.protocol==='capacitor:'||window.location.hostname==='localhost';
        var isPwaStandalone=!!(window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches)||!!navigator.standalone;
        if(isCapacitor||isCapacitorScheme||isPwaStandalone){
            var s=document.createElement('script');s.src='js/app-update.js';document.head.appendChild(s);
        }
    })();</script>

    <script>
    // ── 全局根路径 ────────────────────────────────────────────────────────
    window.CX_ROOT = './';
    window.CX = window.CX || {};

    // ── 核心资源 URL 列表（用于 PWA 缓存校验）────────────────────────────
    window.__cxCoreUrls = [
        './','./manifest.json','./sw.js',
        './version.json','./app_config.json',
        './css/style.css','./css/bible-theme.css',
        './js/i18n.js','./js/lang-pack.js',
        './js/ref-detector.js','./js/router.js','./js/renderer.js','./js/bible-renderer.js',
        './js/dev-console.js','./js/theme-toggle.js','./js/search.js','./js/speech.js',
        './js/outline.js','./js/scripture-popup.js','./js/image-utils.js',
        './js/nav-stack.js','./js/race-fastest.js',
        './js/bible-dict.js','./js/highlight.js',
        './vendor/localforage.min.js','./vendor/jszip.min.js',
        './icons/icon-192.png','./icons/icon-512.png',
        './data/bible-books.json','./data/bible-versions.json','./data/book-names-i18n.json'
    ];

    // ── 环境检测 ──────────────────────────────────────────────────────────
    var CX_ENV = (function(){
        return {
            isAndroid:/Android/i.test(navigator.userAgent),
            isIOS:/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream,
            isCapacitor:window.Capacitor!==undefined,
            isCapacitorScheme:window.location.protocol==='capacitor:'||window.location.hostname==='localhost',
            isStandalone:window.navigator.standalone===true||(window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches),
            get isInApp(){return this.isStandalone;},
            get isCapacitorApp(){return this.isCapacitor||this.isCapacitorScheme;}
        };
    })();

    // ── SPA 视图切换辅助 ──────────────────────────────────────────────────
    // CXRouter 会调用 CXRenderer，renderer 内部调用 _showApp() / _showHome()
    // 这两个函数注册到 CXRenderer 里；这里提前注册以便 renderer.js 可以访问
    window._cxShowHome = function() {
        document.getElementById('homeView').style.display = '';
        document.getElementById('app').style.display = 'none';
        document.title = '📖 圣经';
        window.scrollTo(0, 0);
    };
    window._cxShowApp = function() {
        document.getElementById('homeView').style.display = 'none';
        document.getElementById('app').style.display = '';
    };

    (function(){

            // 如果当前 hash 已有非主页路由，不再额外跳转

            var curHashIsMain=!curHash||curHash==='#'||curHash==='#/';
            console.log('[页面记忆] isApp=true hasRestored=' + hasRestored + ' curHash="' + curHash + '" curHashIsMain=' + curHashIsMain);
            if(hasRestored||!curHashIsMain){
                sessionStorage.setItem('cx_has_restored','true');
                console.log('[页面记忆] 已恢复或当前非主页，直接 initHomePage');
                if(window.CXNavStack)window.CXNavStack.initHomePage();
                return;
            }
            var lastPage=localStorage.getItem('cx_last_page');
            var lastPageTime=localStorage.getItem('cx_last_page_time');
            console.log('[页面记忆] lastPage=' + lastPage);
            if(lastPage&&lastPageTime){
                var parsedTime=parseInt(lastPageTime);

                var timeDiff=Date.now()-parsedTime;
                if(timeDiff<7*24*60*60*1000){

                    var lastPageIsMain=!lastHash||lastHash==='#'||lastHash==='#/';

    function getCxMainCacheName(){
        return caches.keys().then(function(keys){
            return keys.find(function(k){return k.indexOf('cx-main')===0;})||'cx-main';
        });
    }

    function waitForTrainings(timeout){

    function verifyCacheIntegrity(trainings){
        if(!('caches' in window))return Promise.resolve({ok:false,coverage:0,missingCore:0,missingTrainings:[]});
        var coreUrls=window.__cxCoreUrls||[];
        return caches.keys().then(function(keys){
            var hasCoreCache=keys.some(function(k){return k==='cx-main'||k.indexOf('cx-main-')===0;});
            if(!hasCoreCache)return{ok:false,coverage:0,missingCore:coreUrls.length,missingTrainings:(trainings||[]).map(function(t){return t.path;})};
            var checkUrls=coreUrls.filter(function(u){return u!=='./';}); 
            return getCxMainCacheName().then(function(cacheName){return caches.open(cacheName);}).then(function(cache){
                return Promise.all(checkUrls.map(function(u){return cache.match(u).then(function(r){return r?null:u;});}));
            }).then(function(results){
                var missingUrls=results.filter(Boolean);
                var hits=checkUrls.length-missingUrls.length;
                var cov=checkUrls.length>0?hits/checkUrls.length:1;
                if(cov<1)return{ok:false,coverage:cov,missingCore:missingUrls.length,missingCoreUrls:missingUrls,missingTrainings:[]};
                if(!trainings||!trainings.length)return{ok:true,coverage:1,missingCore:0,missingTrainings:[]};
                var missingT=trainings.filter(function(t){return!keys.some(function(k){return k==='cx-'+t.path;});});
                var tCov=(trainings.length-missingT.length)/trainings.length;
                return{ok:tCov>=1,coverage:tCov,missingCore:0,missingTrainings:missingT.map(function(t){return t.path;})};
            });
        }).catch(function(){return{ok:false,coverage:0,missingCore:0,missingTrainings:[]};});
    }

    function cacheAllTrainings(statusEl,onProgress){
        if(!('caches' in window)){if(statusEl)statusEl.textContent='当前环境不支持缓存';return Promise.resolve();}
        var coreUrls=window.__cxCoreUrls||[];
        var totalResources=coreUrls.length;var cachedResources=0;
        function rep(){var p=totalResources>0?Math.round(cachedResources/totalResources*100):0;if(onProgress)onProgress(p);return p;}
        if(statusEl)statusEl.textContent='正在缓存核心资源...';
        return getCxMainCacheName().then(function(cacheName){return caches.open(cacheName);}).then(function(cache){
            return Promise.allSettled(coreUrls.map(function(url){
                return fetch(url,{cache:'no-cache'}).then(function(r){cachedResources++;rep();if(r.ok)return cache.put(url,r.clone());}).catch(function(){cachedResources++;rep();});
            }));
        }).then(function(){
            if(statusEl){statusEl.textContent='✓ 缓存完成';statusEl.className='cache-status success';}
            try{localStorage.setItem('cx_all_cached',Date.now().toString());}catch(e){}
        });
    }

    function showMandatoryInstallDialog(mode,targetVersion){
        if(document.getElementById('cxInstallMask'))return;
        var icons={install:'📦',update:'🔄'};
        var titles={install:'首次安装缓存',update:'缓存更新中'};
        var subs={install:'首次使用会缓存核心资源，请保持网络连接...',update:'正在重新缓存资源，用户数据不受影响...'};
        var mask=document.createElement('div');mask.id='cxInstallMask';mask.className='cx-install-mask';
        mask.innerHTML='<div class="cx-install-box"><div class="cx-install-icon">'+icons[mode]+'</div><div class="cx-install-title">'+titles[mode]+'</div><div class="cx-install-sub">'+subs[mode]+'</div><div class="cx-install-progress"><div class="cx-install-progress-bar" id="cxInstallProgressBar"></div></div><div class="cx-install-status" id="cxInstallStatus">正在准备...</div><button class="cx-install-retry" id="cxInstallRetry">重试</button></div>';
        mask.addEventListener('click',function(e){e.stopPropagation();});
        document.body.appendChild(mask);
        var statusEl=document.getElementById('cxInstallStatus');
        var progressBar=document.getElementById('cxInstallProgressBar');
        var retryBtn=document.getElementById('cxInstallRetry');
        function doInstall(){
            if(retryBtn)retryBtn.style.display='none';
            if(progressBar)progressBar.style.width='0%';
            if(statusEl)statusEl.textContent='开始缓存资源...';
            cacheAllTrainings(statusEl,function(percent){if(progressBar)progressBar.style.width=Math.min(percent,100)+'%';}).then(function(){
                if(progressBar)progressBar.style.width='100%';
                if(statusEl)statusEl.textContent='✅ 缓存完成，即将重载...';
                try{localStorage.setItem('cx_pwa_version',targetVersion);}catch(e){}
                setTimeout(function(){window.location.reload();},1200);
            }).catch(function(err){
                if(statusEl)statusEl.textContent='⚠ 出错：'+(err&&err.message||'未知')+'，请重试';
                if(retryBtn)retryBtn.style.display='block';
            });
        }
        if(retryBtn)retryBtn.addEventListener('click',doInstall);
        doInstall();
    }

    function checkPwaStartupCache(){
        if(!CX_ENV.isStandalone||CX_ENV.isCapacitorApp||!('caches' in window))return;
        var storedVersion=null;try{storedVersion=localStorage.getItem('cx_pwa_version');}catch(e){}
        fetch('./version.json?t='+Date.now(),{cache:'no-store'})
            .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
            .then(function(v){
                var remoteVersion=v.version||v.apk_version;
                var targetVersion=remoteVersion||storedVersion;
                var versionChanged=remoteVersion&&storedVersion!==remoteVersion;
                if(versionChanged){
                    if(storedVersion){
                        _showPwaUpdateReady();
                    } else {
                        showMandatoryInstallDialog('install',targetVersion);
                    }
                    return;
                }
            })
            .catch(function(err){
                if(!storedVersion){var b=document.getElementById('cxOfflineBanner');if(b){b.classList.add('show');var d=b.querySelector('.cx-banner-dismiss');if(d)d.addEventListener('click',function(){b.classList.remove('show');});}}
            });
    }

    function _showPwaUpdateReady(){

    // 注册 Service Worker（非 Capacitor 原生环境）
    if('serviceWorker' in navigator){
        var _isNativeApp=!!(window.Capacitor&&window.Capacitor.isNativePlatform&&window.Capacitor.isNativePlatform());
        if(_isNativeApp){
            // Capacitor WebView 不支持 SW，跳过注册
            // APK 所有资源已内置，首次启动在后台静默填充 Cache API，不阻塞用户；
            // 完成后写 cx_pwa_version，后续启动直接跳过。
            if('caches' in window){
                var _capVer=null;try{_capVer=localStorage.getItem('cx_pwa_version');}catch(e){}
                fetch('./version.json?t='+Date.now(),{cache:'no-store'})
                    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
                    .then(function(v){
                        var _ver=v.version||v.apk_version||'';
                        if(_capVer&&_capVer===_ver)return;
                        cacheAllTrainings(null,null).then(function(){
                            if(_ver)try{localStorage.setItem('cx_pwa_version',_ver);}catch(e){}
                        }).catch(function(){});
                    })
                    .catch(function(){/* 离线时跳过 */});
            }
        } else {
        navigator.serviceWorker.register('./sw.js').then(function(reg){
            reg.update().catch(function(){});
            reg.addEventListener('updatefound',function(){
                var nw=reg.installing;
                if(nw)nw.addEventListener('statechange',function(){
                    if(nw.state==='installed'&&navigator.serviceWorker.controller)nw.postMessage({type:'SKIP_WAITING'});
                });
            });
            return navigator.serviceWorker.ready;
        }).then(function(){checkPwaStartupCache();}).catch(function(e){console.error('[SW]',e);});
        var refreshing=false;
        navigator.serviceWorker.addEventListener('controllerchange',function(){
            if(refreshing)return;
            var isNative=!!(window.Capacitor&&window.Capacitor.isNativePlatform&&window.Capacitor.isNativePlatform());
            if(isNative)return;
            refreshing=true;window.location.reload();
        });
        } // end else (non-native)
    }

    // 主页 PWA/清理功能委托（供 theme-toggle.js 调用）
    window.CX.clearData=function(){

    function clearAllCachesAndMemory(opts){
        opts=opts||{};
        var goHome=function(){
            try{window.history.replaceState(null,'',window.location.pathname);}catch(e){}
            window.location.reload();
        };
        if(opts.clearNotesOnly){
            try{localStorage.removeItem('cx_highlights');}catch(e){}
            try{localStorage.removeItem('cx_highlights_bak');}catch(e){}
            var lf=(typeof localforage!=='undefined')?localforage.createInstance({name:'cx',storeName:'highlights'}):null;
            (lf?lf.clear():Promise.resolve()).then(goHome).catch(goHome);
            return;
        }
        var steps=[];
        steps.push(new Promise(function(resolve){try{var keys=[];for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&k.startsWith('cx_')&&k!=='cx_first_use')keys.push(k);else if(k&&k.startsWith('cx-'))keys.push(k);if(k==='fontSize'||k==='globalFontSize'||k==='readingTheme'||k==='speechRate')keys.push(k);}keys.forEach(function(k){localStorage.removeItem(k);});resolve();}catch(e){resolve();}}));
        steps.push(new Promise(function(resolve){try{sessionStorage.clear();resolve();}catch(e){resolve();}}));
        if('serviceWorker' in navigator)steps.push(navigator.serviceWorker.getRegistrations().then(function(regs){return Promise.all(regs.map(function(r){return r.unregister();}));}).catch(function(){}));
        if('caches' in window)steps.push(caches.keys().then(function(keys){return Promise.all(keys.map(function(k){return caches.delete(k);}));}).catch(function(){}));
        if('indexedDB' in window)steps.push(new Promise(function(resolve){try{var dbs=['cx-trainings','cx-cache','workbox-expiration','localforage'];Promise.all(dbs.map(function(n){return new Promise(function(r){var req=indexedDB.deleteDatabase(n);req.onsuccess=req.onerror=req.onblocked=r;});})).then(resolve);}catch(e){resolve();}}));
        if(typeof localforage!=='undefined')steps.push(localforage.clear().catch(function(){}));
        Promise.all(steps).then(goHome);
    }
