name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Build Android APK"]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build
        run: python main.py

      - name: Download latest APK from GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔍 正在从 GitHub Releases 获取最新 APK..."
          release_info=$(curl -s -H "Authorization: token $GH_TOKEN" \
            https://api.github.com/repos/zhao-zg/bible/releases/latest)
          
          download_url=$(echo "$release_info" | jq -r '.assets[] | select(.name | test("apk$")) | .url' | head -1)
          apk_name=$(echo "$release_info" | jq -r '.assets[] | select(.name | test("apk$")) | .name' | head -1)
          
          if [ -n "$download_url" ] && [ "$download_url" != "null" ]; then
            echo "📦 下载: $apk_name"
            curl -L -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/octet-stream" \
              -o "output/$apk_name" \
              "$download_url"
            echo "✅ APK 已下载到 output/$apk_name"
            ls -lh "output/$apk_name"
          else
            echo "⚠️ 未找到 APK 文件，跳过下载"
          fi

      - name: Check and create Cloudflare Pages project
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "🔍 检查 Cloudflare Pages 项目 bible 是否存在..."
          response=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/bible" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json")

          success=$(echo "$response" | jq -r '.success')

          if [ "$success" = "true" ]; then
            echo "✅ 项目 bible 已存在"
          else
            echo "📦 项目不存在，正在创建..."
            create_response=$(curl -s -X POST \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{"name": "bible", "production_branch": "main"}')

            create_success=$(echo "$create_response" | jq -r '.success')
            if [ "$create_success" = "true" ]; then
              echo "✅ 项目 bible 创建成功"
            else
              echo "❌ 项目创建失败"
              echo "$create_response" | jq '.'
              exit 1
            fi
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy output --project-name=bible --commit-dirty=true
