name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm install

      - name: Build web assets
        run: python main.py

      - name: Capacitor init & sync
        run: |
          rm -rf android
          npx cap add android
          # Restore signing.gradle (init script) tracked in repo
          git restore android/
          npx cap sync android

      - name: Setup signing
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/release-key.jks
          echo "ANDROID_KEYSTORE_FILE=$GITHUB_WORKSPACE/android/release-key.jks" >> $GITHUB_ENV
          echo "ANDROID_PASSWORD=${{ secrets.ANDROID_PASSWORD }}" >> $GITHUB_ENV

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --init-script signing.gradle

      - name: Rename APK
        run: |
          APK_DIR="android/app/build/outputs/apk/release"
          APK_FILE=$(find "$APK_DIR" -name "*.apk" -type f | head -1)
          if [ -n "$APK_FILE" ]; then
            VERSION=$(jq -r '.version' app_config.json)
            TARGET="$APK_DIR/bible-v${VERSION}.apk"
            cp "$APK_FILE" "$TARGET"
            echo "✅ APK 已重命名为: bible-v${VERSION}.apk"
            ls -lh "$TARGET"
          else
            echo "❌ 未找到 APK 文件"
            find "$APK_DIR" -type f || echo "目录不存在"
            exit 1
          fi

      - name: Upload APK to GitHub Releases
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: android/app/build/outputs/apk/release/bible-v*.apk
